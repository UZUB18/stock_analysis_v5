<css-doodle><style>
  @grid: 5x1 / 100vw 100vh / #2f2f2f;
  @content: Pure;
  @place: center;
  @size: 100% 0;
  color: @pn(#fff8ec, #feb944, #fe6842, #df5584, #5a5ca8);
  z-index: @I(-@i);
  font-weight: bold;
  font-size: 20vw;
  line-height: 0;
  text-stroke: .25vw #2f2f2f;
  transition: @i(*.05s);
  scale: calc(1 - .05 * @i);
  rotate: calc(8deg/@uw*(@ux - @uw/2) * @dx(-2));
  translate: 0 calc(2vh/@uh*(@uy - @uh/2) * @dx(-2))
</style></css-doodle>
